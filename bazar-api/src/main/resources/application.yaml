spring:
  application:
    name: bazar-api
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/bazar_api?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${DB_USERNAME:bazar_user}
    password: ${DB_PASSWORD:bazar_pass}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs

server:
  port: 8080
