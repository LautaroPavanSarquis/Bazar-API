spring:
  application:
    name: bazar-api
  datasource:
    url: jdbc:postgresql://localhost:5432/bazar_api?options=-c%20TimeZone%3DUTC
    username: ${DB_USERNAME:bazar_user}
    password: ${DB_PASSWORD:bazar_pass}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
    url: jdbc:postgresql://localhost:5432/bazar_api?options=-c%20TimeZone%3DUTC
    user: ${DB_USERNAME:bazar_user}
    password: ${DB_PASSWORD:bazar_pass}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs

server:
  port: 8080